<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="gA" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#67e8f9"/><stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="gB" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="gC" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/><stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="gD" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#c084fc"/><stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67e8f9"/><stop offset="0.55" stop-color="#a78bfa"/><stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- dark rounded tile -->
  <rect x="4" y="4" width="112" height="112" rx="26" fill="#0b1020"/>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="none" stroke="#223" stroke-width="1.5"/>
  <!-- ascending productivity bars -->
  <g opacity="0.92">
    <rect x="24" y="66" width="14" height="26" rx="5" fill="url(#gA)"/>
    <rect x="42" y="54" width="14" height="38" rx="5" fill="url(#gB)"/>
    <rect x="60" y="40" width="14" height="52" rx="5" fill="url(#gC)"/>
    <rect x="78" y="24" width="14" height="68" rx="5" fill="url(#gD)"/>
  </g>
  <!-- rising pace pulse across the bars -->
  <g filter="url(#glow)">
    <polyline points="24,74 49,62 67,46 92,30" fill="none" stroke="url(#gLine)"
              stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="92" cy="30" r="5.5" fill="#f9a8d4"/>
  </g>
</svg>
